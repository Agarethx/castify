services:
  postgres:
    image: postgres:16-alpine
    container_name: castify_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: castify_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  srs:
    image: ossrs/srs:6
    container_name: castify-srs
    restart: always
    ports:
      - "1935:1935"
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/srs.conf
      - hls_data:/usr/local/srs/objs/nginx/html
    depends_on:
      - api

  hls-server:
    image: nginx:alpine
    container_name: castify-hls
    restart: always
    ports:
      - "8081:80"
    volumes:
      - hls_data:/usr/share/nginx/html:ro
      - ./nginx/hls.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - srs

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: castify-mediamtx
    restart: always
    ports:
      - "8889:8889"       # WebRTC/WHIP HTTP handshake
      - "8189:8189/udp"   # ICE/WebRTC UDP data
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml

  tracker:
    build:
      context: ./tracker
      dockerfile: Dockerfile
    container_name: castify-tracker
    restart: always
    ports:
      - "1337:1337"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: castify_api
    restart: always
    ports:
      - "3001:3001"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: castify_web
    restart: always
    ports:
      - "3000:3000"
    env_file: .env.prod
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  hls_data:
