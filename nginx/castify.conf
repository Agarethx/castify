upstream castify_api {
    server 127.0.0.1:3001;
}

upstream castify_web {
    server 127.0.0.1:3000;
}

upstream castify_hls {
    server 127.0.0.1:8081;
}

upstream castify_tracker {
    server 127.0.0.1:1337;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name CASTIFY_DOMAIN www.CASTIFY_DOMAIN;
    return 301 https://$host$request_uri;
}

# Main app
server {
    listen 443 ssl;
    server_name CASTIFY_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/CASTIFY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CASTIFY_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Web (Next.js)
    location / {
        proxy_pass http://castify_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API
    location /api {
        proxy_pass http://castify_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 2G;
    }

    # HLS live segments
    location /live {
        proxy_pass http://castify_hls/live;
        proxy_cache_bypass 1;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # HLS VOD segments
    location /vod {
        proxy_pass http://castify_hls/vod;
        add_header Cache-Control max-age=3600;
        add_header Access-Control-Allow-Origin *;
    }

    # WebSocket tracker P2P
    location /announce {
        proxy_pass http://castify_tracker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
