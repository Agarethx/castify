listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         off;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    4;
        hls_window      30;
        hls_cleanup     on;
    }

    http_hooks {
        enabled         on;
        # Usa host.docker.internal para alcanzar la API cuando corre fuera de Docker (pnpm dev)
        # Si la API también corre en Docker, cambiar a http://api:3001
        on_publish      http://host.docker.internal:3001/api/streaming/on-publish;
        on_unpublish    http://host.docker.internal:3001/api/streaming/on-unpublish;
    }
}
