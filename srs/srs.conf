listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         off;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    4;
        hls_window      30;
        hls_cleanup     on;
    }

    http_hooks {
        enabled         on;
        # IP del Mac en la red local — accesible desde Docker en macOS
        # (host.docker.internal en Docker Desktop macOS apunta a una IP virtual que no llega al host)
        # Cambiar esta IP si cambia la red Wi-Fi: `ipconfig getifaddr en0`
        on_publish      http://192.168.100.103:3001/api/streaming/on-publish?secret=dev-secret;
        on_unpublish    http://192.168.100.103:3001/api/streaming/on-unpublish?secret=dev-secret;
    }
}
