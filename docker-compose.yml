services:
  postgres:
    image: postgres:16-alpine
    container_name: castify_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-castify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-castify_secret}
      POSTGRES_DB: ${POSTGRES_DB:-castify_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-castify}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: castify_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  srs:
    image: ossrs/srs:6
    container_name: castify-srs
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP ingest (OBS / ffmpeg)
      - "8080:8080"   # HTTP API de SRS
      - "1985:1985"   # HTTP API interna (para getSrsStats desde host)
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/srs.conf
      - hls_data:/usr/local/srs/objs/nginx/html
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hls-server:
    image: nginx:alpine
    container_name: castify-hls
    restart: unless-stopped
    ports:
      - "8081:80"     # browser: http://localhost:8081/hls/{streamKey}/index.m3u8
    volumes:
      - hls_data:/usr/share/nginx/html:ro
      - /tmp/castify-vod:/castify-vod:ro                 # VOD: API escribe en /tmp/castify-vod, nginx sirve desde /castify-vod
      - ./nginx/hls.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - srs

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: castify-mediamtx
    restart: unless-stopped
    ports:
      - "8889:8889"       # WebRTC/WHIP HTTP handshake
      - "8189:8189/udp"   # ICE/WebRTC UDP data
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml

  tracker:
    build:
      context: ./tracker
      dockerfile: Dockerfile
    container_name: castify-tracker
    restart: unless-stopped
    ports:
      - "1337:1337"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: castify_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-castify}:${POSTGRES_PASSWORD:-castify_secret}@postgres:5432/${POSTGRES_DB:-castify_db}?schema=public
      REDIS_URL: redis://redis:6379
      HLS_BASE_URL: http://localhost:8081
      SRS_INTERNAL_URL: http://srs:1985
      VOD_UPLOAD_DIR: /tmp/castify-uploads
      HLS_VOD_DIR: /tmp/castify-vod
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - /tmp/castify-vod:/tmp/castify-vod   # comparte con nginx en Docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: castify_web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  hls_data:
